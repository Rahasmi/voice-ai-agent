<!DOCTYPE html>
<html>
<head>
<title>AI Voice Assistant</title>

<style>
body{
font-family: Arial;
margin:40px;
}

#chat{
border:1px solid #ccc;
height:350px;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
}

input{
width:300px;
padding:8px;
}

button{
padding:8px 12px;
margin-left:5px;
}
</style>

</head>

<body>

<h2>AI Voice Assistant</h2>

<div id="chat"></div>

<input id="message" placeholder="Type message here">
<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>

<script>

let ws = new WebSocket("ws://127.0.0.1:8000/ws");

function addMessage(sender,text){

let chat=document.getElementById("chat")

chat.innerHTML += "<p><b>"+sender+":</b> "+text+"</p>"

chat.scrollTop = chat.scrollHeight
}

ws.onmessage = function(event){

addMessage("Bot",event.data)

let speech = new SpeechSynthesisUtterance(event.data)
speechSynthesis.speak(speech)

};

function sendMessage(){

let message=document.getElementById("message").value

if(message=="") return

addMessage("You",message)

ws.send(message)

document.getElementById("message").value=""

}

function startVoice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

if(!SpeechRecognition){
alert("Use Chrome browser for voice input")
return
}

const recognition = new SpeechRecognition()

recognition.lang="en-US"

recognition.start()

recognition.onresult=function(event){

let text = event.results[0][0].transcript

document.getElementById("message").value=text

sendMessage()

}

}

</script>

</body>
</html>
